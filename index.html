<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Emissão de Certificados IMAC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* Cores do Tema IMAC */
        :root { --cor-imac: #5c3d2e; }

        @media screen {
            body { background-color: #e5e7eb; }
            #printArea { display: none; }
        }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            
            .certificate-page {
                width: 297mm; height: 210mm;
                background-color: #f2e9e1; /* Cor de fundo do seu papel */
                display: flex; align-items: center; justify-content: center;
                padding: 10mm; box-sizing: border-box;
            }

            .cert-box {
                width: 100%; height: 100%;
                border: 2px solid var(--cor-imac);
                padding: 5mm;
                display: flex; align-items: center; justify-content: center;
            }

            .cert-inner {
                width: 100%; height: 100%;
                border: 1px solid var(--cor-imac);
                display: flex; flex-direction: column; align-items: center;
                color: var(--cor-imac); position: relative;
            }

            .logo-header { margin-top: 30px; text-align: center; }
            .logo-img { height: 60px; margin-bottom: 5px; }
            .cnpj { font-family: 'Montserrat', sans-serif; font-size: 10px; }

            .titulo { font-family: 'Cinzel', serif; font-size: 48px; font-weight: 700; margin-top: 20px; }
            .subtitulo { font-family: 'Montserrat', sans-serif; font-size: 16px; margin-top: 10px; letter-spacing: 2px; }
            .outorgado { font-family: 'Montserrat', sans-serif; font-size: 14px; margin-top: 30px; }
            .nome-aluno { font-family: 'Playfair Display', serif; font-style: italic; font-size: 55px; margin: 20px 0; border-bottom: 1px solid var(--cor-imac); padding: 0 40px; }
            
            .info-curso { font-family: 'Montserrat', sans-serif; font-size: 18px; margin-top: 20px; text-align: center; line-height: 1.5; }

            .footer-assinaturas {
                margin-top: auto; margin-bottom: 50px;
                width: 80%; display: flex; justify-content: space-between;
            }
            .assinatura { text-align: center; width: 250px; }
            .linha-assinatura { border-top: 1px solid var(--cor-imac); margin-bottom: 5px; }
            .nome-assinatura { font-weight: 700; font-size: 12px; }
            .cargo { font-size: 10px; }
        }
    </style>
</head>
<body class="p-4">

    <!-- PAINEL -->
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-[#5c3d2e] mb-6">Configurar Certificados IMAC</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase">Logo</label>
                <input type="file" id="logoInput" class="w-full mt-2 p-2 border rounded">
                <input type="text" id="tituloCurso" value="CURSO: PADRÃO DE FORNEAMENTO DE PÃES, PÃES DE QUEIJO E SALGADOS" class="w-full mt-4 p-2 border rounded">
                <input type="text" id="datas" value="REALIZADO NOS DIAS: 6 à 10 DE ABRIL DE 2026." class="w-full mt-2 p-2 border rounded">
                <input type="text" id="carga" value="CARGA HORÁRIA: 40 HORAS." class="w-full mt-2 p-2 border rounded">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase">Lista de Nomes</label>
                <textarea id="namesList" rows="6" class="w-full mt-2 p-2 border rounded" placeholder="Um nome por linha"></textarea>
            </div>
        </div>
        <button onclick="gerar()" class="w-full mt-6 bg-[#5c3d2e] text-white py-3 rounded font-bold hover:bg-opacity-90">GERAR E IMPRIMIR</button>
    </div>

    <!-- ÁREA DE IMPRESSÃO -->
    <div id="printArea"></div>

    <script>
        let logoBase64 = "https://placehold.co/200x60/5c3d2e/white?text=IMAC+LOGO";
        document.getElementById('logoInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => logoBase64 = ev.target.result;
            reader.readAsDataURL(e.target.files[0]);
        };

        function gerar() {
            const names = document.getElementById('namesList').value.split('\n').filter(n => n.trim());
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';
            
            names.forEach(name => {
                printArea.innerHTML += `
                <div class="certificate-page">
                    <div class="cert-box">
                        <div class="cert-inner">
                            <div class="logo-header">
                                <img src="${logoBase64}" class="logo-img">
                                <div class="cnpj">IMAC Indústria de Massas Congeladas<br>CNPJ: 03.523.769/0001-82</div>
                            </div>
                            <div class="titulo">CERTIFICADO</div>
                            <div class="subtitulo">${document.getElementById('tituloCurso').value}</div>
                            <div class="outorgado">OUTORGADO A</div>
                            <div class="nome-aluno">${name}</div>
                            <div class="info-curso">
                                ${document.getElementById('datas').value}<br>
                                ${document.getElementById('carga').value}
                            </div>
                            <div class="footer-assinaturas">
                                <div class="assinatura">
                                    <div class="linha-assinatura"></div>
                                    <div class="nome-assinatura">JOSÉ DE SOUSA BARROS</div>
                                    <div class="cargo">Técnico de Panificação – IMAC Congelados</div>
                                </div>
                                <div class="assinatura">
                                    <div class="linha-assinatura"></div>
                                    <div class="nome-assinatura">THALITA LELIS</div>
                                    <div class="cargo">Gerente Industrial – IMAC Congelados</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            window.print();
        }
    </script>
</body>
</html>
