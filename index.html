<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Emissão de Certificados IMAC</title>
    
    <!-- Tailwind CSS para o design do painel -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts para ficar igual ao PowerPoint -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --cor-imac-marrom: #5c3d2e; 
            --cor-imac-dourado: #b45309;
        }

        @media screen {
            body { background-color: #f3f4f6; }
            #printArea { display: none; }
        }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            
            #printArea {
                position: absolute;
                left: 0; top: 0; width: 100%;
            }

            .certificate-page {
                width: 297mm; height: 210mm;
                page-break-after: always;
                break-after: page;
                margin: 0;
                box-sizing: border-box;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* Fundo temático com pães */
            .certificate-bg {
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                background-color: #e6d5c3; /* Fundo marromzinho/bege como no original */
                /* Padrão SVG inline simulando pães e trigo com cor ajustada para combinar */
                background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23ccaa8c' stroke-width='2' fill='none'%3E%3Cpath d='M10 30 Q25 10 40 30 Q25 50 10 30 Z'/%3E%3Cpath d='M60 80 Q75 60 90 80 Q75 100 60 80 Z'/%3E%3Cpath d='M70 20 C70 5 95 5 95 20 C95 35 70 35 70 20 Z'/%3E%3Cpath d='M20 70 C10 70 10 90 20 90 C30 90 30 70 20 70 Z'/%3E%3C/g%3E%3C/svg%3E");
                background-size: 80px 80px;
                z-index: 1;
            }

            /* Fundo enviado pelo usuário via upload */
            .custom-bg {
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                z-index: 1;
            }

            /* Caixa branca semi-transparente no centro */
            .certificate-overlay {
                background-color: rgba(255, 255, 255, 0.88);
                width: 88%;
                height: 88%;
                position: relative;
                z-index: 10;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 15mm;
                box-sizing: border-box;
                box-shadow: 0 0 20px rgba(0,0,0,0.05);
            }

            .logo-container {
                margin-bottom: 5px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .logo-img { height: 50px; margin-bottom: 5px; object-fit: contain; }
            .cnpj-text {
                font-family: 'Montserrat', sans-serif;
                font-size: 9px;
                color: var(--cor-imac-marrom);
                font-weight: 600;
                line-height: 1.2;
            }

            .cert-title {
                font-family: 'Lora', serif;
                font-size: 40px;
                font-weight: 700;
                color: var(--cor-imac-marrom);
                letter-spacing: 2px;
                margin-top: 15px;
            }

            .cert-course {
                font-family: 'Montserrat', sans-serif;
                font-size: 15px;
                font-weight: 700;
                color: var(--cor-imac-marrom);
                margin-top: 5px;
            }

            .cert-outorgado {
                font-family: 'Montserrat', sans-serif;
                font-size: 14px;
                color: var(--cor-imac-marrom);
                margin-top: 25px;
                letter-spacing: 1px;
            }

            .cert-student {
                font-family: 'Lora', serif;
                font-size: 44px;
                font-weight: 700;
                color: var(--cor-imac-dourado); /* Cor laranja/dourada igual ao modelo */
                margin: 15px 0;
            }

            .cert-details {
                font-family: 'Montserrat', sans-serif;
                font-size: 15px;
                color: var(--cor-imac-marrom);
                line-height: 1.6;
                margin-top: 15px;
            }

            .cert-signatures {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                margin-top: auto;
                padding: 0 10px;
            }

            .sig-block {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 220px;
            }

            .sig-line {
                width: 100%;
                border-top: 1px solid var(--cor-imac-marrom);
                margin-bottom: 5px;
            }

            .sig-name {
                font-family: 'Montserrat', sans-serif;
                font-size: 12px;
                font-weight: 700;
                color: var(--cor-imac-marrom);
            }

            .sig-role {
                font-family: 'Montserrat', sans-serif;
                font-size: 10px;
                color: var(--cor-imac-marrom);
            }

            .sig-participant {
                color: var(--cor-imac-dourado);
            }

            .back-title {
                font-family: 'Lora', serif;
                font-size: 28px;
                font-weight: 700;
                color: var(--cor-imac-marrom);
                margin: 25px 0;
                text-transform: uppercase;
            }

            .back-content {
                font-family: 'Montserrat', sans-serif;
                font-size: 12px;
                color: var(--cor-imac-marrom);
                text-align: left;
                width: 90%;
                line-height: 1.6;
                margin: 0 auto;
            }
            
            .back-content ul {
                list-style-type: disc;
                padding-left: 20px;
            }
            
            .back-content li {
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body class="text-slate-800 antialiased font-sans">

    <div class="min-h-screen p-4 md:p-8 flex items-center justify-center">
        <div class="w-full max-w-6xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
            
            <!-- Lado Esquerdo: Configurações -->
            <div class="w-full md:w-3/5 p-8 bg-slate-50 border-r border-slate-200 overflow-y-auto" style="max-height: 90vh;">
                <div class="flex items-center gap-3 mb-6">
                    <h1 class="text-2xl font-bold text-[#5c3d2e]">Configuração do Certificado IMAC</h1>
                </div>

                <form class="space-y-5">
                    <!-- Uploads -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white p-4 rounded-lg shadow-sm border border-slate-200">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Upload da Logo</label>
                            <input type="file" id="logoInput" accept="image/*" class="w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-[#5c3d2e] file:text-white hover:file:bg-opacity-90">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Imagem de Fundo (Opcional)</label>
                            <input type="file" id="bgInput" accept="image/*" class="w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-[#b45309] file:text-white hover:file:bg-opacity-90">
                            <p class="text-[10px] text-slate-500 mt-1">Se vazio, usará o fundo de pães padrão.</p>
                        </div>
                    </div>

                    <!-- Frente do Certificado -->
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Título do Curso</label>
                        <input type="text" id="courseTitle" value="CURSO: PADRÃO DE FORNEAMENTO DE PÃES, PÃES DE QUEIJO E SALGADOS" class="w-full px-3 py-2 border border-slate-300 rounded focus:ring-1 focus:ring-[#5c3d2e] outline-none font-semibold text-sm">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Dias de Realização</label>
                            <input type="text" id="dateText" value="REALIZADO NOS DIAS: 6 à 10 DE ABRIL DE 2026." class="w-full px-3 py-2 border border-slate-300 rounded text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Carga Horária</label>
                            <input type="text" id="workloadText" value="CARGA HORÁRIA: 40 HORAS." class="w-full px-3 py-2 border border-slate-300 rounded text-sm outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-3 rounded border border-slate-200">
                            <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Assinatura Esquerda</label>
                            <input type="text" id="sig1Name" value="José de Sousa Barros" class="w-full px-2 py-1 border border-slate-300 rounded text-xs mb-2">
                            <input type="text" id="sig1Role" value="Técnico de Panificação – IMAC Congelados" class="w-full px-2 py-1 border border-slate-300 rounded text-xs">
                        </div>
                        <div class="bg-white p-3 rounded border border-slate-200">
                            <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Assinatura Direita</label>
                            <input type="text" id="sig2Name" value="Thalita Lelis" class="w-full px-2 py-1 border border-slate-300 rounded text-xs mb-2">
                            <input type="text" id="sig2Role" value="Gerente Industrial – IMAC Congelados" class="w-full px-2 py-1 border border-slate-300 rounded text-xs">
                        </div>
                    </div>

                    <!-- Verso do Certificado -->
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1 mt-4 border-t pt-4">Conteúdo Programático (Verso)</label>
                        <p class="text-xs text-slate-500 mb-2">Cada linha será um item da lista. Separe os tópicos por "Enter".</p>
                        <textarea id="programContent" rows="6" class="w-full px-3 py-2 border border-slate-300 rounded text-sm outline-none resize-none">Técnicas de fermentação e modelagem: telamento, tempo de degelo e fermentação, modelagem e adição de coberturas quando necessário, cortes característicos do produto;
Assamento de produtos: manuseio de forno, controle de temperatura e de tempo;
Frituras: manuseio de fritadeira industrial elétrica, controle de temperatura e de tempo;
Pães tradicionais: pão francês, pão francês leve, pão francês milho, baguetes, pão hot dog, pães hambúrgueres, pão de coco;
Pães especiais: pão rústico com vinho, pão vegano, pão australiano, pão andino, baguete tomate seco e etc;
Pães de queijo: coquetel, lanche e chipa;
Salgados: croissants com e sem recheio, folhados com recheio, frituras (coxinha de frango, risole de carne, croquete calabresa e enroladinho de salsicha) e quiches salgadas.</textarea>
                    </div>
                </form>
            </div>

            <!-- Lado Direito: Lista de Nomes e Botão -->
            <div class="w-full md:w-2/5 p-8 flex flex-col bg-white">
                <label class="block text-sm font-bold text-slate-700 mb-2 uppercase">Lista de Alunos</label>
                <p class="text-xs text-slate-500 mb-2">Cole um nome por linha. O sistema irá gerar a <strong>Frente</strong> e o <strong>Verso</strong> para cada um.</p>
                
                <div class="flex-grow flex flex-col mb-6">
                    <textarea id="namesList" class="flex-grow w-full p-4 border-2 border-slate-200 rounded-xl focus:border-[#b45309] outline-none resize-none font-medium text-slate-700" placeholder="Aline Cardoso de Carvalho&#10;João da Silva&#10;Maria Santos"></textarea>
                </div>

                <button onclick="generateAndPrint()" class="w-full py-4 bg-[#5c3d2e] hover:bg-[#4a3024] text-white rounded-xl font-bold text-lg shadow-lg transition-all flex items-center justify-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Gerar e Imprimir
                </button>
            </div>

        </div>
    </div>

    <!-- Área Oculta para Renderizar os Certificados -->
    <div id="printArea"></div>

    <script>
        let uploadedLogo = null;
        let uploadedBg = null;

        // Leitor de imagem para Logo
        document.getElementById('logoInput').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => uploadedLogo = event.target.result;
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // Leitor de imagem para Fundo Personalizado
        document.getElementById('bgInput').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => uploadedBg = event.target.result;
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        function generateAndPrint() {
            const namesText = document.getElementById('namesList').value;
            const names = namesText.split('\n').map(n => n.trim()).filter(n => n.length > 0);

            if (names.length === 0) {
                alert("Por favor, insira a lista de alunos.");
                return;
            }

            // Captura de Campos
            const courseTitle = document.getElementById('courseTitle').value;
            const dateText = document.getElementById('dateText').value;
            const workloadText = document.getElementById('workloadText').value;
            
            const sig1Name = document.getElementById('sig1Name').value;
            const sig1Role = document.getElementById('sig1Role').value;
            const sig2Name = document.getElementById('sig2Name').value;
            const sig2Role = document.getElementById('sig2Role').value;

            // Tratamento do conteúdo programático para criar os LIs
            const programText = document.getElementById('programContent').value;
            const programItems = programText.split('\n').filter(p => p.trim() !== '');
            const ulContent = programItems.map(item => `<li>${item}</li>`).join('');

            // Imagens
            const logoSrc = uploadedLogo || 'logo.png';
            const bgDiv = uploadedBg 
                ? `<div class="custom-bg" style="background-image: url('${uploadedBg}')"></div>` 
                : `<div class="certificate-bg"></div>`;

            // Bloco de cabeçalho padrão (usado na frente e no verso)
            const headerHTML = `
                <div class="logo-container">
                    <img src="${logoSrc}" class="logo-img" alt="IMAC Logo" onerror="this.src='https://placehold.co/200x80/e6d5c3/5c3d2e?text=IMAC+LOGO&font=Montserrat'">
                    <div class="cnpj-text text-center">IMAC Indústria de Massas Congeladas<br>CNPJ: 03.523.769/0001-82</div>
                </div>
            `;

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';

            names.forEach(name => {
                
                // --- PÁGINA 1: FRENTE ---
                const frontPage = `
                    <div class="certificate-page">
                        ${bgDiv}
                        <div class="certificate-overlay">
                            ${headerHTML}
                            
                            <h1 class="cert-title">CERTIFICADO</h1>
                            <h2 class="cert-course">${courseTitle}</h2>
                            
                            <p class="cert-outorgado">OUTORGADO A</p>
                            <h3 class="cert-student">${name}</h3>
                            
                            <div class="cert-details">
                                <p>${dateText}</p>
                                <p>${workloadText}</p>
                            </div>

                            <div class="cert-signatures">
                                <div class="sig-block">
                                    <div class="sig-line"></div>
                                    <p class="sig-name">${sig1Name}</p>
                                    <p class="sig-role">${sig1Role}</p>
                                </div>
                                
                                <div class="sig-block">
                                    <div class="sig-line"></div>
                                    <p class="sig-name sig-participant">${name}</p>
                                    <p class="sig-role sig-participant">Participante</p>
                                </div>

                                <div class="sig-block">
                                    <div class="sig-line"></div>
                                    <p class="sig-name">${sig2Name}</p>
                                    <p class="sig-role">${sig2Role}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // --- PÁGINA 2: VERSO (CONTEÚDO PROGRAMÁTICO) ---
                const backPage = `
                    <div class="certificate-page">
                        ${bgDiv}
                        <div class="certificate-overlay">
                            ${headerHTML}
                            
                            <h2 class="back-title">Conteúdo Programático</h2>
                            
                            <div class="back-content">
                                <ul>
                                    ${ulContent}
                                </ul>
                            </div>
                            
                            <!-- Spacer flexível para empurrar o conteúdo pra cima se necessário -->
                            <div style="flex-grow: 1;"></div> 
                        </div>
                    </div>
                `;

                printArea.insertAdjacentHTML('beforeend', frontPage + backPage);
            });

            // Chama a impressão
            setTimeout(() => { window.print(); }, 500);
        }
    </script>
</body>
</html>
